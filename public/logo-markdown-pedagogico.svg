<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Markdown Pedagógico</title>
  <desc id="desc">Logo profesional de la aplicación Markdown Pedagógico con una hoja, símbolo markdown y guía visual de progreso.</desc>
  <defs>
    <!-- Background Gradient: Deep slate / midnight UI -->
    <linearGradient id="bgGrad" x1="20" y1="20" x2="236" y2="236">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Document Base Gradient: Crisp white to subtle gray -->
    <linearGradient id="docGrad" x1="56" y1="52" x2="188" y2="200">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>

    <!-- Folded Corner Gradient -->
    <linearGradient id="foldGrad" x1="152" y1="52" x2="188" y2="88">
      <stop offset="0%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Markdown Symbol Gradient: Vibrant Indigo/Sky Blue -->
    <linearGradient id="mdGrad" x1="84" y1="104" x2="160" y2="132">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>

    <!-- Pedagogical Path Gradient: Amber/Orange -->
    <linearGradient id="pathGrad" x1="64" y1="164" x2="176" y2="152">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>

    <!-- Document Drop Shadow -->
    <filter id="docShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Fold Shadow (Subtle) -->
    <filter id="foldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-2" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- App Icon Base Squircle -->
  <rect x="20" y="20" width="216" height="216" rx="52" fill="url(#bgGrad)" />
  <!-- Gloss inner rim -->
  <rect x="21" y="21" width="214" height="214" rx="51" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2" />

  <!-- The Document / Hoja -->
  <path d="M 68 52
           H 152
           L 188 88
           V 188
           A 12 12 0 0 1 176 200
           H 68
           A 12 12 0 0 1 56 188
           V 64
           A 12 12 0 0 1 68 52
           Z" 
        fill="url(#docGrad)" 
        filter="url(#docShadow)" />

  <!-- Document Folded Corner -->
  <path d="M 152 52
           V 72
           A 16 16 0 0 0 168 88
           H 188
           Z" 
        fill="url(#foldGrad)" 
        filter="url(#foldShadow)" />

  <!-- Markdown Symbol -->
  <g stroke="url(#mdGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Letter M -->
    <path d="M 84 132 V 104 L 102 120 L 120 104 V 132" />
    <!-- Down Arrow -->
    <path d="M 148 104 V 132 M 136 120 L 148 132 L 160 120" />
  </g>

  <!-- Pedagogical Visual Guide -->
  <g>
    <!-- Path line -->
    <path d="M 64 164 C 90 164, 110 176, 136 176 S 164 160, 176 152" 
          stroke="url(#pathGrad)" stroke-width="4" stroke-dasharray="6 8" stroke-linecap="round" fill="none" />
    <!-- Start Node -->
    <circle cx="64" cy="164" r="4" fill="#fbbf24" />
    <!-- Mid Node -->
    <circle cx="136" cy="176" r="4" fill="#f59e0b" />
    <!-- End Node (Target) -->
    <circle cx="176" cy="152" r="7" fill="#fffbeb" stroke="#f97316" stroke-width="3"/>
    <circle cx="176" cy="152" r="2.5" fill="#f97316" />
  </g>
</svg>
